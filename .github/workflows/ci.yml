name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: EmbarkStudios/cargo-deny-action@v2

  fmt:
    name: rustfmt / 1.95.0
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt

      - name: Rust rustfmt
        run: cargo fmt --all -- --check

  clippy:
    name: clippy / 1.95.0
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

  test:
    name: test / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - name: stable
            rust: stable
            os: ubuntu-latest
          - name: beta
            rust: beta
            os: ubuntu-latest
          - name: nightly
            rust: nightly
            os: ubuntu-latest
          - name: 1.88.0
            rust: 1.88.0
            os: ubuntu-latest
          - name: windows
            rust: stable
            os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Run tests
        run: cargo test
